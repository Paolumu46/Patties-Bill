<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <meta charset="utf-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f4f4f4;
            color: #000;
        }

        .print-btn {
            display: block;
            margin: 0 auto 20px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .no-print {
                display: none;
            }

            .invoice-wrapper {
                box-shadow: none !important;
                margin: 0 !important;
                width: 100% !important;
                padding: 10mm !important;
            }
        }

        .invoice-wrapper {
            width: 210mm;
            min-height: 297mm;
            background: white;
            margin: auto;
            padding: 15mm;
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .invoice-half {
            height: 48%;
            display: flex;
            flex-direction: column;
        }

        .invoice-divider {
            border-top: 1px dashed #ccc;
            margin: 2% 0;
            height: 1px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            font-weight: bold;
        }

        .header h2 {
            font-size: 18px;
            margin: 0;
            letter-spacing: 2px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .log-box {
            border: 1px solid #000;
            padding: 2px 20px;
            display: inline-block;
            min-width: 100px;
            text-align: center;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            flex-grow: 1;
        }

        th,
        td {
            border: 1px solid #000;
            padding: 8px;
        }

        th {
            text-align: center;
            background-color: #f9f9f9;
        }

        .col-room {
            width: 15%;
            text-align: center;
            font-weight: bold;
        }

        .col-desc {
            width: 60%;
        }

        .col-amount {
            width: 25%;
            text-align: right;
        }

        .no-border-bottom td {
            border-bottom: none;
        }

        .no-border-top td {
            border-top: none;
        }

        .no-border-tb td {
            border-top: none;
            border-bottom: none;
        }

        .totals {
            display: flex;
            font-size: 14px;
        }

        .totals-text {
            width: 75%;
            border: 1px solid #000;
            border-right: none;
            border-top: none;
            padding: 8px;
            text-align: left;
        }

        .totals-amount {
            width: 25%;
            border: 1px solid #000;
            border-top: none;
            padding: 8px;
            text-align: right;
            font-weight: bold;
            background: #f9f9f9;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-top: 15px;
        }

        .payment-box {
            border: 1px solid #000;
            border-radius: 8px;
            padding: 10px;
            width: 60%;
        }

        .qr-placeholder {
            width: 80px;
            height: 80px;
            background: #eee;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .payment-info {
            display: flex;
            gap: 15px;
        }

        .sign-box {
            width: 35%;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="no-print" style="text-align:center; margin-bottom: 20px;">
        <h2>เลือกใบแจ้งหนี้จากข้อมูลที่ได้จาก Google Sheet (Database)</h2>
        <select id="invoiceSelect" onchange="renderInvoice()" style="padding: 10px; font-size: 16px;">
            <option value="">-- กำลังโหลดข้อมูล... --</option>
        </select>
        <br><br>
        <button class="print-btn" onclick="window.print()">พิมพ์ใบแจ้งหนี้ (Print)</button>
    </div>

    <div class="invoice-wrapper" id="invoiceContainer">
        <!-- Invoice content will be injected here -->
    </div>

    <script>
        let invoicesData = [];

        // Load data from Google Apps Script
        google.script.run.withSuccessHandler(function (data) {
            invoicesData = data;
            const select = document.getElementById('invoiceSelect');
            select.innerHTML = '<option value="">-- เลือกใบแจ้งหนี้ --</option>';
            data.forEach((inv, index) => {
                if (inv.LogNo || inv.Room) {
                    select.innerHTML += `<option value="${index}">Log: ${inv.LogNo} | ห้อง: ${inv.Room} | วันที่: ${inv.Date}</option>`;
                }
            });
            if (data.length > 0) {
                select.value = 0;
                renderInvoice();
            }
        }).getInvoiceData();

        function renderInvoice() {
            const select = document.getElementById('invoiceSelect');
            const idx = select.value;
            if (idx === "") return;
            const inv = invoicesData[idx];

            const html = `
        ${createHalf(inv)}
        <div class="invoice-divider"></div>
        ${createHalf(inv)}
      `;
            document.getElementById('invoiceContainer').innerHTML = html;
        }

        function createHalf(inv) {
            // Build rows for items dynamically based on what's available
            let rowsHtml = '';

            const items = [
                { desc: inv.Item1Desc, amt: inv.Item1Amt },
                { desc: inv.Item2Desc, amt: inv.Item2Amt },
                { desc: inv.Item3Desc, amt: inv.Item3Amt },
                { desc: inv.Item4Desc, amt: inv.Item4Amt }
            ].filter(i => i.desc || i.amt);

            if (items.length === 0) {
                // Default empty rows
                rowsHtml += `
            <tr class="no-border-tb">
              <td class="col-room">${inv.Room || ''}</td>
              <td class="col-desc">&nbsp;</td>
              <td class="col-amount">&nbsp;</td>
            </tr>
            <tr class="no-border-tb"><td class="col-room"></td><td class="col-desc">&nbsp;</td><td class="col-amount">&nbsp;</td></tr>
            <tr class="no-border-tb"><td class="col-room"></td><td class="col-desc">&nbsp;</td><td class="col-amount">&nbsp;</td></tr>
         `;
            } else {
                items.forEach((item, index) => {
                    let roomCell = index === 0 ? `<td class="col-room">${inv.Room || ''}</td>` : `<td class="col-room"></td>`;
                    let borderClass = index === 0 ? 'no-border-bottom' : (index === items.length - 1 ? 'no-border-top' : 'no-border-tb');
                    // if there's only 1 item
                    if (items.length === 1) borderClass = 'no-border-tb';

                    rowsHtml += `
            <tr class="${borderClass}">
              ${roomCell}
              <td class="col-desc">${item.desc || ''}</td>
              <td class="col-amount">${item.amt || ''}</td>
            </tr>
          `;
                });

                // Fill up some empty space if few items
                if (items.length < 3) {
                    for (let i = 0; i < 3 - items.length; i++) {
                        let bc = (items.length + i === 2) ? 'no-border-top' : 'no-border-tb';
                        rowsHtml += `<tr class="${bc}"><td class="col-room"></td><td class="col-desc">&nbsp;</td><td class="col-amount">&nbsp;</td></tr>`;
                    }
                }
            }

            return `
      <div class="invoice-half">
        <div class="header">
          <h1>ใบแจ้งหนี้</h1>
          <h2>INVOICE</h2>
        </div>
        <div class="info-row">
          <div>
            Log No. : <span class="log-box">${inv.LogNo || ''}</span>
          </div>
          <div>
            วัน /เดือน /ปี : ${inv.Date || ''}
          </div>
        </div>
        
        <table>
          <thead>
            <tr>
              <th class="col-room">ห้อง</th>
              <th class="col-desc">รายการ</th>
              <th class="col-amount">จำนวนเงิน (บาท)</th>
            </tr>
          </thead>
          <tbody>
            ${rowsHtml}
          </tbody>
        </table>

        <div class="totals">
          <div class="totals-text">ตัวอักษร: ( ${inv.TotalText || ''} ) ยอดรวม</div>
          <div class="totals-amount">${inv.TotalAmt || ''}</div>
        </div>

        <div class="footer">
          <div class="payment-info">
            <div class="qr-placeholder" style="display:${inv.QRPicUrl ? 'block' : 'flex'}">
              ${inv.QRPicUrl ? `<img src="${inv.QRPicUrl}" alt="QR" style="width:100%; height:100%; object-fit:contain;">` : '<span>QR Code</span>'}
            </div>
            <div class="payment-box">
              <div style="font-weight:bold; border-bottom:1px solid #000; display:inline-block; margin-bottom:5px;">ช่องทางการชำระเงิน</div>
              <div>${inv.BankName || 'ธนาคาร KASIKORN THAI'}</div>
              <div>ชื่อบัญชี : ${inv.AccName || 'สุมนา จิวรุ่งเรือง'}&nbsp;&nbsp;&nbsp;เลขบัญชี : ${inv.AccNo || '004-2-335924'}</div>
            </div>
          </div>
          <div class="sign-box">
            ผู้รับเงิน ....................................................
          </div>
        </div>
      </div>
      `;
        }
    </script>
</body>

</html>
